name: CI

# Runs the backend test suite and a production frontend build on every PR and on
# pushes to main, so regressions are caught before merge.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      JWT_SECRET: test-secret-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run curated test suite
        run: python -m pytest
      - name: Run placeholder-absorption tests (isolated)
        # Bootstraps its own DB at import, so it runs in a separate process.
        run: python -m pytest test_placeholder_absorption.py

  rls-postgres:
    name: RLS (Postgres)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brightspace_rls
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: test-secret-ci
      # database.db requires DATABASE_URL at import; the RLS test uses its own
      # engine via RLS_TEST_DATABASE_URL (the postgres service) and ignores this.
      DATABASE_URL: sqlite:////tmp/rls_ci_sqlite.db
      RLS_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/brightspace_rls
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Validate Postgres Row-Level Security (MT-3)
        run: python -m pytest tests/test_tenancy_rls_postgres.py -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
