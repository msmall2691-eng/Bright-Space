[pytest]
addopts = -q -p no:cacheprovider
# CI runs this curated, vetted-green set (plus test_placeholder_absorption.py,
# which is run as a separate invocation because it bootstraps its own DB at
# import and can't share a process cleanly). The rest of the suite (the tests/
# subdirectory, test_ical_auto_sync, and the standalone test_pipeline /
# test_maineclean_workflow / test_contact_phone_backwards / test_public_quote_flow
# scripts) has pre-existing breakage from schema + behavior drift and is excluded
# until rehabilitated. Add new shareable test files to this list.
testpaths =
    test_auth_middleware.py
    test_complete_workflow.py
    test_phone_tail.py
    test_quotes_integer.py
