# which is run as a separate invocation because it bootstraps its own DB at
# import and can't share a process cleanly).
#
# Still excluded, pending rehabilitation (these need real per-test fixes, not
# just infra):
#   tests/test_activity_logger.py            (teardown StaleData on one test)
#   tests/test_ical_sync_str_fix.py          (monkeypatches a since-moved httpx ref)
#   tests/test_normalize_properties.py       (2 assertion-drift failures)
#   tests/test_rehydrate_dates.py            (hardcodes client_id=1; needs fixtures)
#   tests/test_visit_pre_materialization.py  (teardown query misuse)
#   test_ical_auto_sync.py, and the standalone test_pipeline /
#   test_maineclean_workflow / test_contact_phone_backwards /
#   test_public_quote_flow scripts.
# Add new shareable test files to this list.
testpaths =
    test_auth_middleware.py
    test_complete_workflow.py
    test_phone_tail.py
    test_quotes_integer.py
    tests/test_calendar_date_fallback.py
    tests/test_client_import.py
    tests/test_ical_cancellation.py
    tests/test_ical_to_gcal.py
    tests/test_recurrence_phase0.py
    tests/test_recurrence_phase1.py
    tests/test_recurrence_phase3_endpoint.py
    tests/test_visit_model.py
