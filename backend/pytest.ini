    tests/test_ical_cancellation.py
    tests/test_ical_sync_str_fix.py
    tests/test_ical_to_gcal.py
    tests/test_normalize_properties.py
    tests/test_property_custom_fields.py
    tests/test_recurring_daily.py
    tests/test_cancel_removes_from_schedule.py
    tests/test_schema_drift.py
    tests/test_recurrence_phase0.py
    tests/test_recurrence_phase1.py
