[pytest]
addopts = -q -p no:cacheprovider
# CI runs this curated, vetted-green set (plus test_placeholder_absorption.py,
# which is run as a separate invocation because it bootstraps its own DB at
# import and can't share a process cleanly).
#
# Still excluded. The remaining tests/ files are blocked by real PRODUCTION-code
# issues (not test bugs), so rehabilitating them means a deliberate app change:
#   tests/test_rehydrate_dates.py / test_visit_pre_materialization.py /
#   test_ical_sync_str_fix.py — generate_jobs / _sync_ical_url / the rehydrate
#     endpoint assign ISO date STRINGS to the Date-typed Job columns. Postgres
#     coerces "YYYY-MM-DD" -> date; SQLite rejects it, so these can't run on the
#     test DB until that date handling is normalized in the app.
#   tests/test_normalize_properties.py — 2 failures from a real change in the
#     STR-inference rules (a residential property with a check_in_time is now
#     inferred STR); needs a product decision, not a test tweak.
#   test_ical_auto_sync.py, and the standalone test_pipeline /
#   test_maineclean_workflow / test_contact_phone_backwards /
#   test_public_quote_flow scripts.
# Add new shareable test files to this list.
testpaths =
    test_auth_middleware.py
    test_complete_workflow.py
    test_phone_tail.py
    test_quotes_integer.py
    tests/test_activity_logger.py
    tests/test_calendar_date_fallback.py
    tests/test_client_import.py
    tests/test_ical_cancellation.py
    tests/test_ical_to_gcal.py
    tests/test_recurrence_phase0.py
    tests/test_recurrence_phase1.py
    tests/test_recurrence_phase3_endpoint.py
    tests/test_visit_model.py
