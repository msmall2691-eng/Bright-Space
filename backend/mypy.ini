# mypy configuration. Pragmatic strictness for the modules we've churned
# the most — `modules/scheduling/` and `modules/recurring/`. Goal: catch
# real bugs (NameError, arg-type, return-value mismatches) without
# requiring every FastAPI route handler to be fully typed in one PR.
#
# To run locally:
#   cd backend && mypy --config-file mypy.ini modules/scheduling/ modules/recurring/
#
# Tighten progressively by removing entries from `disable_error_code`
# below. Recommended order:
#   1. Type the public helpers (`require_role`, `get_current_user`)
#      → drop `no-untyped-call`.
#   2. Annotate route handler return types
#      → drop `no-untyped-def`.
#   3. Add `from __future__ import annotations` + concrete generics
#      → drop `type-arg`.
[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = True
warn_unused_ignores = True
no_implicit_optional = True
check_untyped_defs = True
strict_equality = True

# Limit to the two modules we've actively churned and want to gate. Add
# more modules as they are typed.
files = modules/scheduling, modules/recurring

# These are deferred — the codebase isn't fully annotated and FastAPI's
# decorator stubs erase return types. They block on real bugs being seen,
# so we keep them off until the easier annotations land.
disable_error_code =
    untyped-decorator,
    no-untyped-def,
    no-untyped-call,
    type-arg,
    var-annotated,
    misc

# Active error codes. These catch:
#   name-defined  — referencing an undefined symbol (the pytz bug we
#                   found on the first run)
#   arg-type      — passing the wrong type to a function
#   return-value  — returning the wrong type
#   assignment    — implicit Optional violations + bad reassignments
#   operator      — arithmetic/comparison with incompatible types
#   index         — bad indexing into typed containers
#   no-any-return — silently returning Any from a typed function
#   import-not-found — only flagged for first-party modules

[mypy-database.*]
follow_imports = skip

[mypy-utils.*]
follow_imports = skip

# Don't drag in modules outside our target scope. They will be progressively
# added to the typed surface as we get to them.
[mypy-integrations.*]
follow_imports = skip

[mypy-auth_jwt]
follow_imports = skip

[mypy-modules.auth.*]
follow_imports = skip

[mypy-modules.intake.*]
follow_imports = skip
